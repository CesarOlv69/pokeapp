<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GBA Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;min-height:100vh;color:#fff;font-family:sans-serif;padding-top:env(safe-area-inset-top)}
#screen{display:block;image-rendering:pixelated;width:100%;max-width:480px;background:#000;aspect-ratio:3/2}
#status{padding:8px;font-size:12px;color:#aaa;text-align:center}
.row{display:flex;gap:8px;padding:4px 8px;justify-content:center;align-items:center;width:100%}
.btn{padding:14px 18px;background:#2a2a2a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none;width:48px;height:48px;display:flex;align-items:center;justify-content:center}
.btn:active{background:#444}
.btn-a{background:#CC0000;width:52px;height:52px;border-radius:50%}
.btn-b{background:#555;width:52px;height:52px;border-radius:50%}
.btn-back{background:rgba(204,0,0,.2);border:1px solid rgba(204,0,0,.4);color:#FF6666;border-radius:20px;padding:6px 16px;font-size:12px;font-weight:700;width:auto;height:auto}
</style>
</head>
<body>
<canvas id="screen" width="240" height="160"></canvas>
<div id="status">⏳ Chargement...</div>

<div class="row">
  <button class="btn btn-back" onclick="history.back()">← Retour</button>
</div>

<div class="row">
  <button class="btn" id="btn-l">L</button>
  <button class="btn" id="dpad-u">▲</button>
  <button class="btn" id="dpad-l">◀</button>
  <button class="btn" id="dpad-d">▼</button>
  <button class="btn" id="dpad-r">▶</button>
  <button class="btn" id="btn-r">R</button>
</div>
<div class="row">
  <button class="btn" id="btn-select" style="font-size:10px;width:auto;padding:8px 12px">SELECT</button>
  <button class="btn" id="btn-start" style="font-size:10px;width:auto;padding:8px 12px">START</button>
  <button class="btn btn-b" id="btn-b">B</button>
  <button class="btn btn-a" id="btn-a">A</button>
</div>

<!-- gbajs2 -->
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/util.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/core.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/arm.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/thumb.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/mmu.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/io.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/audio.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/video.js"></script>
<script src="./js/video/software.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/irq.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/keypad.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/sio.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/savedata.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/gpio.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/gba.js"></script>

<script>
// Patch Worker path
const _OW=window.Worker;
window.Worker=function(url,...a){
  if(url&&url.toString().includes('worker.js')) url='./js/video/worker.js';
  return new _OW(url,...a);
};

let gba=null;

// Charge la ROM depuis IndexedDB
const req=indexedDB.open('gba_db',1);
req.onupgradeneeded=e=>e.target.result.createObjectStore('roms');
req.onsuccess=function(e){
  const db=e.target.result;
  const tx=db.transaction('roms','readonly');
  const get=tx.objectStore('roms').get('current');
  get.onsuccess=function(){
    if(!get.result){document.getElementById('status').textContent='❌ Aucune ROM trouvée';return;}
    const rom=get.result;
    document.getElementById('status').textContent='⏳ '+rom.name+'...';
    startGba(rom.data, rom.name);
  };
};

function startGba(romData, romName){
  // Charge le BIOS
  fetch('./gba_bios.bin')
    .then(r=>r.arrayBuffer())
    .then(bios=>{launchGba(romData,romName,bios);})
    .catch(()=>launchGba(romData,romName,null));
}

function launchGba(romData, romName, bios){
  try{
    gba=new GameBoyAdvance();
    gba.setCanvas(document.getElementById('screen'));
    gba.logLevel=gba.LOG_ERROR;
    if(bios) gba.setBios(bios,false);
    if(gba.setRom(romData)){
      gba.runStable();
      document.getElementById('status').textContent='🎮 '+romName;
    } else {
      document.getElementById('status').textContent='❌ ROM invalide';
    }
  }catch(err){
    document.getElementById('status').textContent='❌ '+err.message;
  }
}

// Boutons
const keyMap={
  'btn-a':90,'btn-b':88,'btn-select':220,'btn-start':13,
  'dpad-r':39,'dpad-l':37,'dpad-u':38,'dpad-d':40,'btn-r':83,'btn-l':65
};
Object.entries(keyMap).forEach(([id,kc])=>{
  const el=document.getElementById(id);
  if(!el)return;
  const dn=e=>{e.preventDefault();document.dispatchEvent(new KeyboardEvent('keydown',{keyCode:kc,which:kc,bubbles:true}));};
  const up=e=>{e.preventDefault();document.dispatchEvent(new KeyboardEvent('keyup',{keyCode:kc,which:kc,bubbles:true}));};
  el.addEventListener('touchstart',dn,{passive:false});
  el.addEventListener('touchend',up,{passive:false});
  el.addEventListener('mousedown',dn);
  el.addEventListener('mouseup',up);
});
</script>
</body>
</html>
